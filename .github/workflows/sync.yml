# ============================================================
#  .github/workflows/sync.yml
#  Calls Shopify REST API + Google Sheets API DIRECTLY
#  No Vercel involved — no timeout issues!
#  Runs every 6 hours FREE on GitHub Actions
# ============================================================

name: Shopify Product Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    name: Sync Products to Google Sheets
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Sync Shopify → Google Sheets
        env:
          SHOPIFY_STORE:   ${{ secrets.SHOPIFY_STORE_DOMAIN }}
          SHOPIFY_TOKEN:   ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SPREADSHEET_ID:  ${{ secrets.GOOGLE_SPREADSHEET_ID }}
          SHEET_NAME:      ${{ secrets.GOOGLE_SHEET_TAB_NAME }}
          SA_EMAIL:        ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          SA_KEY:          ${{ secrets.GOOGLE_PRIVATE_KEY }}
        run: |
          pip install requests google-auth --quiet

          python3 << 'PYTHON'
          import requests, json, os, time
          from google.oauth2 import service_account
          from googleapiclient.discovery import build

          # ── CONFIG ────────────────────────────────────────────
          STORE       = os.environ["SHOPIFY_STORE"]
          TOKEN       = os.environ["SHOPIFY_TOKEN"]
          SHEET_ID    = os.environ["SPREADSHEET_ID"]
          SHEET_NAME  = os.environ.get("SHEET_NAME", "Shopify Products")
          SA_EMAIL    = os.environ["SA_EMAIL"]
          SA_KEY      = os.environ["SA_KEY"].replace("\\n", "\n")
          API_VERSION = "2024-10"

          print("🛍️  Starting Shopify → Google Sheets sync...")
          print(f"📦 Store: {STORE}")

          # ── FETCH ALL SHOPIFY PRODUCTS ─────────────────────────
          headers = {"X-Shopify-Access-Token": TOKEN, "Content-Type": "application/json"}
          rows    = [["Product ID","Product Title","Product Type","Status",
                      "Total Inventory","Variant ID","Variant Title","SKU",
                      "Price","Variant Inventory","Last Synced At"]]

          url  = f"https://{STORE}/admin/api/{API_VERSION}/products.json?status=active&limit=250&fields=id,title,product_type,variants"
          page = 1
          total_products = 0

          while url:
              print(f"  → Fetching page {page}...")
              resp = requests.get(url, headers=headers)
              resp.raise_for_status()
              products = resp.json().get("products", [])
              total_products += len(products)
              print(f"  → Page {page}: {len(products)} products")

              for p in products:
                  total_inv = sum(max(0, v.get("inventory_quantity", 0)) for v in p["variants"])
                  has_stock = any(v.get("inventory_quantity", 0) >= 1 for v in p["variants"])
                  if not has_stock:
                      continue
                  for v in p["variants"]:
                      qty = v.get("inventory_quantity", 0)
                      if qty < 1:
                          continue
                      rows.append([
                          str(p["id"]),
                          p["title"],
                          p.get("product_type") or "(No Type)",
                          "ACTIVE",
                          total_inv,
                          str(v["id"]),
                          v["title"],
                          v.get("sku") or "",
                          float(v.get("price", 0)),
                          qty,
                          time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime())
                      ])

              # Next page via Link header
              link = resp.headers.get("link", "")
              next_url = None
              for part in link.split(","):
                  if 'rel="next"' in part:
                      next_url = part.split(";")[0].strip().strip("<>")
                      break
              url = next_url
              page += 1
              if url:
                  time.sleep(0.5)

          print(f"✅ Total products scanned: {total_products}")
          print(f"✅ Total rows to write: {len(rows) - 1}")

          # ── WRITE TO GOOGLE SHEETS ─────────────────────────────
          print("📊 Connecting to Google Sheets...")

          key_data = json.loads(json.dumps({
              "type": "service_account",
              "client_email": SA_EMAIL,
              "private_key": SA_KEY,
              "token_uri": "https://oauth2.googleapis.com/token"
          }))

          creds   = service_account.Credentials.from_service_account_info(
              key_data, scopes=["https://www.googleapis.com/auth/spreadsheets"]
          )
          service = build("sheets", "v4", credentials=creds, cache_discovery=False)
          sheet   = service.spreadsheets()

          # Clear existing data
          print("🗑️  Clearing sheet...")
          sheet.values().clear(
              spreadsheetId=SHEET_ID,
              range=SHEET_NAME
          ).execute()

          # Write all data in one batch
          print(f"✍️  Writing {len(rows)} rows...")
          sheet.values().update(
              spreadsheetId=SHEET_ID,
              range=f"{SHEET_NAME}!A1",
              valueInputOption="RAW",
              body={"values": rows}
          ).execute()

          print("✅ Sheet updated successfully!")
          print(f"🎉 Sync complete — {len(rows)-1} product variants written")
          PYTHON

      - name: Done
        run: echo "✅ Sync finished at $(date -u)"
