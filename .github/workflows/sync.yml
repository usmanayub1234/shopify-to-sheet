# ============================================================
#  .github/workflows/sync.yml
#  Syncs Shopify → Google Sheets page by page
#  Works on Vercel FREE plan (under 60s per request)
#  Runs every 6 hours automatically
# ============================================================

name: Shopify Product Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    name: Sync Products to Google Sheets
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      - name: Clear Sheet
        run: |
          URL="https://shopify-to-sheet.vercel.app/api/sync-products"
          SECRET="${{ secrets.CRON_SECRET }}"
          echo "🗑️ Clearing sheet..."
          RESPONSE=$(curl -s -o response.txt -w "%{http_code}" --max-time 55 "${URL}?action=clear&secret=${SECRET}")
          BODY=$(cat response.txt)
          echo "Status: $RESPONSE | Body: $BODY"
          if [ "$RESPONSE" != "200" ]; then echo "❌ Failed: $BODY" && exit 1; fi
          echo "✅ Sheet cleared"

      - name: Sync Page 1
        run: |
          URL="https://shopify-to-sheet.vercel.app/api/sync-products"
          SECRET="${{ secrets.CRON_SECRET }}"
          echo "📦 Page 1 (1-250)..."
          RESPONSE=$(curl -s -o response.txt -w "%{http_code}" --max-time 55 "${URL}?action=sync&page=1&secret=${SECRET}")
          BODY=$(cat response.txt)
          echo "Status: $RESPONSE | Body: $BODY"
          if [ "$RESPONSE" != "200" ]; then echo "❌ Failed: $BODY" && exit 1; fi
          echo "✅ Page 1 done"

      - name: Sync Page 2
        run: |
          URL="https://shopify-to-sheet.vercel.app/api/sync-products"
          SECRET="${{ secrets.CRON_SECRET }}"
          echo "📦 Page 2 (251-500)..."
          RESPONSE=$(curl -s -o response.txt -w "%{http_code}" --max-time 55 "${URL}?action=sync&page=2&secret=${SECRET}")
          BODY=$(cat response.txt)
          echo "Status: $RESPONSE | Body: $BODY"
          if [ "$RESPONSE" != "200" ]; then echo "❌ Failed: $BODY" && exit 1; fi
          echo "✅ Page 2 done"

      - name: Sync Page 3
        run: |
          URL="https://shopify-to-sheet.vercel.app/api/sync-products"
          SECRET="${{ secrets.CRON_SECRET }}"
          echo "📦 Page 3 (501-750)..."
          RESPONSE=$(curl -s -o response.txt -w "%{http_code}" --max-time 55 "${URL}?action=sync&page=3&secret=${SECRET}")
          BODY=$(cat response.txt)
          echo "Status: $RESPONSE | Body: $BODY"
          if [ "$RESPONSE" != "200" ]; then echo "❌ Failed: $BODY" && exit 1; fi
          echo "✅ Page 3 done"

      - name: Sync Page 4
        run: |
          URL="https://shopify-to-sheet.vercel.app/api/sync-products"
          SECRET="${{ secrets.CRON_SECRET }}"
          echo "📦 Page 4 (751-1000)..."
          RESPONSE=$(curl -s -o response.txt -w "%{http_code}" --max-time 55 "${URL}?action=sync&page=4&secret=${SECRET}")
          BODY=$(cat response.txt)
          echo "Status: $RESPONSE | Body: $BODY"
          if [ "$RESPONSE" != "200" ]; then echo "❌ Failed: $BODY" && exit 1; fi
          echo "✅ Page 4 done"

      - name: Sync Page 5
        run: |
          URL="https://shopify-to-sheet.vercel.app/api/sync-products"
          SECRET="${{ secrets.CRON_SECRET }}"
          echo "📦 Page 5 (1001-1250)..."
          RESPONSE=$(curl -s -o response.txt -w "%{http_code}" --max-time 55 "${URL}?action=sync&page=5&secret=${SECRET}")
          BODY=$(cat response.txt)
          echo "Status: $RESPONSE | Body: $BODY"
          if [ "$RESPONSE" != "200" ]; then echo "❌ Failed: $BODY" && exit 1; fi
          echo "✅ Page 5 done"

      - name: Sync Page 6
        run: |
          URL="https://shopify-to-sheet.vercel.app/api/sync-products"
          SECRET="${{ secrets.CRON_SECRET }}"
          echo "📦 Page 6 (1251-1500)..."
          RESPONSE=$(curl -s -o response.txt -w "%{http_code}" --max-time 55 "${URL}?action=sync&page=6&secret=${SECRET}")
          BODY=$(cat response.txt)
          echo "Status: $RESPONSE | Body: $BODY"
          if [ "$RESPONSE" != "200" ]; then echo "❌ Failed: $BODY" && exit 1; fi
          echo "✅ Page 6 done"

      - name: Format Sheet
        run: |
          URL="https://shopify-to-sheet.vercel.app/api/sync-products"
          SECRET="${{ secrets.CRON_SECRET }}"
          echo "🎨 Formatting..."
          curl -s --max-time 55 "${URL}?action=format&secret=${SECRET}"
          echo "✅ Done"

      - name: Summary
        run: |
          echo "🎉 Sync complete at $(date -u)"
          echo "📊 Google Sheet has fresh data"
